worker_processes 1;
error_log /dev/stderr warn;

events {
    worker_connections 256;
}

http {
    resolver 8.8.8.8 8.8.4.4 1.1.1.1 ipv6=off;

    lua_package_path "/usr/local/openresty/nginx/lua/?.lua;;";

    # Cache config: Uses env vars. Set CACHE_SIZE=0 in Koyeb to disable disk usage.
    proxy_cache_path /cache levels=1:2
                     keys_zone=hls_cache:10m
                     max_size=${CACHE_SIZE}
                     inactive=${CACHE_EXPIRY}
                     use_temp_path=off;

    # Optimized buffers for low-memory environments
    proxy_buffer_size 64k;
    proxy_buffers 2 128k;
    proxy_busy_buffers_size 128k;

    # Timeouts to prevent 504 errors on slow origins
    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;
    proxy_read_timeout 300s;

    # Security: Hide Nginx version
    server_tokens off;

    # Rate Limiting: Protect bandwidth (5 req/sec per IP)
    limit_req_zone $binary_remote_addr zone=hls_limit:10m rate=5r/s;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" cache:$upstream_cache_status';

    access_log /dev/stdout main;

    server {
        # CRITICAL: Koyeb default health check is often 8000. 
        # OPTION A: Keep this 80 and set Koyeb "Exposed Port" to 80.
        # OPTION B: Change this to 8000 and keep Koyeb default.
        listen 8080; 
        server_name _;

        # Security: Only allow GET/HEAD
        if ($request_method !~ ^(GET|HEAD)$) {
            return 405;
        }

        location = / {
            root /usr/local/openresty/nginx/html;
            try_files /index.html =404;
        }

        location /public/ {
            root /usr/local/openresty/nginx/html;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # M3U8 Proxy (No caching, rate limited)
        location /m3u8-proxy.m3u8 {
            limit_req zone=hls_limit burst=10 nodelay;
            content_by_lua_file /usr/local/openresty/nginx/lua/m3u8_proxy.lua;
        }

        # TS Segment Proxy (Cached if CACHE_SIZE > 0)
        location /ts-proxy.ts {
            set $target_url "";
            set $custom_host "";
            set $custom_referer "";
            set $custom_origin "";
            set $custom_ua "";
            set $custom_cookie "";
            set $custom_auth "";
            set $custom_accept "";
            set $custom_accept_lang "";
            set $custom_accept_enc "";
            set $custom_xff "";
            set $custom_range "";

            access_by_lua_file /usr/local/openresty/nginx/lua/ts_access.lua;
            
            limit_req zone=hls_limit burst=20 nodelay;

            proxy_pass $target_url;
            proxy_ssl_server_name on;
            proxy_ssl_protocols TLSv1.2 TLSv1.3;

            proxy_set_header Host $custom_host;
            proxy_set_header Referer $custom_referer;
            proxy_set_header Origin $custom_origin;
            proxy_set_header User-Agent $custom_ua;
            proxy_set_header Cookie $custom_cookie;
            proxy_set_header Authorization $custom_auth;
            proxy_set_header Accept $custom_accept;
            proxy_set_header Accept-Language $custom_accept_lang;
            proxy_set_header Accept-Encoding $custom_accept_enc;
            proxy_set_header X-Forwarded-For $custom_xff;
            proxy_set_header Range $custom_range;

            proxy_cache hls_cache;
            proxy_cache_key $target_url;
            proxy_cache_valid 200 ${CACHE_EXPIRY};
            proxy_cache_use_stale error timeout updating;
            proxy_cache_lock on;

            proxy_cache_bypass $http_range;
            proxy_no_cache $http_range;

            add_header X-Cache-Status $upstream_cache_status always;
            add_header Cache-Control "public, max-age=86400" always;

            header_filter_by_lua_file /usr/local/openresty/nginx/lua/ts_headers.lua;
        }

        # MP4 Proxy (Streaming, no cache)
        location /mp4-proxy.mp4 {
            set $target_url "";
            set $custom_host "";
            set $custom_referer "";
            set $custom_origin "";
            set $custom_ua "";
            set $custom_cookie "";
            set $custom_auth "";
            set $custom_accept "";
            set $custom_accept_lang "";
            set $custom_accept_enc "";
            set $custom_xff "";
            set $custom_range "";

            access_by_lua_file /usr/local/openresty/nginx/lua/ts_access.lua;
            
            limit_req zone=hls_limit burst=20 nodelay;

            proxy_pass $target_url;
            proxy_ssl_server_name on;
            proxy_ssl_protocols TLSv1.2 TLSv1.3;

            proxy_set_header Host $custom_host;
            proxy_set_header Referer $custom_referer;
            proxy_set_header Origin $custom_origin;
            proxy_set_header User-Agent $custom_ua;
            proxy_set_header Cookie $custom_cookie;
            proxy_set_header Authorization $custom_auth;
            proxy_set_header Accept $custom_accept;
            proxy_set_header Accept-Language $custom_accept_lang;
            proxy_set_header Accept-Encoding $custom_accept_enc;
            proxy_set_header X-Forwarded-For $custom_xff;
            proxy_set_header Range $custom_range;

            proxy_buffering off;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;
            proxy_hide_header Access-Control-Allow-Credentials;
            proxy_hide_header Access-Control-Expose-Headers;

            add_header Cache-Control "no-store" always;

            header_filter_by_lua_file /usr/local/openresty/nginx/lua/ts_headers.lua;
        }
    }
}
